{% extends "base.html" %}
{% block title %}忘記密碼 — Gitea Tracker{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-login">
    <div class="card">
      <div class="card-body">
        <h2 class="card-title text-center mb-4">忘記密碼</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else category }}">{{ message }}</div>
          {% endfor %}
        {% endwith %}
        <p class="text-muted">輸入您的 Email，我們會寄送密碼重設連結。</p>
        <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required autofocus>
          </div>
          <button type="submit" class="btn btn-primary w-100">送出</button>
        </form>
        <div class="text-center mt-3">
          <a href="{{ url_for('auth.login') }}">返回登入</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
