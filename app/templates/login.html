{% extends "base.html" %}

{% block title %}登入 — Gitea Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-login">
    <div class="card">
      <div class="card-body">
        <h2 class="card-title text-center mb-4">登入 Gitea Tracker</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else category }}">
              {{ message }}
            </div>
          {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <label class="form-label" for="username">帳號</label>
            <input type="text" name="username" id="username" class="form-control"
                   placeholder="Username" autofocus required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">密碼</label>
            <input type="password" name="password" id="password" class="form-control"
                   placeholder="Password" required>
          </div>
          <div class="form-footer">
            <button type="submit" class="btn btn-primary w-100">登入</button>
          </div>
        </form>
        <div class="text-center mt-3" style="font-size:13px;">
          <a href="{{ url_for('auth.forgot_password') }}">忘記密碼？</a>
          <span class="mx-2">|</span>
          <a href="{{ url_for('auth.register') }}">沒有帳號？點此註冊</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
