{% extends "admin/base_admin.html" %}
{% set active_page = 'smtp' %}
{% block title %}郵件設定 — Admin{% endblock %}
{% block admin_content %}
<div class="card">
  <div class="card-header"><h3 class="card-title">郵件設定</h3></div>
  <div class="card-body">
    <p class="text-muted" style="font-size:13px;">
      寄信透過公司內部 API (ddi_api.pl)，只需設定寄件人地址。
    </p>
    <form method="POST" action="{{ url_for('admin.update_smtp') }}">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">寄件人 Email (From)</label>
          <input type="email" name="mail_from" class="form-control form-control-sm"
                 value="{{ settings.mail_from }}" placeholder="gitea-tracker@company.com" required>
        </div>
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-sm btn-primary">儲存</button>
      </div>
    </form>
    <hr>
    <form method="POST" action="{{ url_for('admin.test_smtp') }}" class="row g-2 align-items-end">
      <div class="col-auto">
        <label class="form-label">收件人 (測試)</label>
        <input type="email" name="test_to" class="form-control form-control-sm"
               placeholder="your@company.com" required style="width:250px;">
      </div>
      <div class="col-auto">
        <button type="submit" class="btn btn-sm btn-outline-primary">寄送測試信</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
