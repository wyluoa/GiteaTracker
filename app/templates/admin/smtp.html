{% extends "admin/base_admin.html" %}
{% set active_page = 'smtp' %}
{% block title %}SMTP — Admin{% endblock %}
{% block admin_content %}
<div class="card">
  <div class="card-header"><h3 class="card-title">SMTP 設定</h3></div>
  <div class="card-body">
    <form method="POST" action="{{ url_for('admin.update_smtp') }}">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Host</label>
          <input type="text" name="smtp_host" class="form-control form-control-sm" value="{{ settings.smtp_host }}">
        </div>
        <div class="col-md-2">
          <label class="form-label">Port</label>
          <input type="number" name="smtp_port" class="form-control form-control-sm" value="{{ settings.smtp_port }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">From Email</label>
          <input type="email" name="smtp_from_email" class="form-control form-control-sm" value="{{ settings.smtp_from_email }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Username</label>
          <input type="text" name="smtp_user" class="form-control form-control-sm" value="{{ settings.smtp_user }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Password</label>
          <input type="password" name="smtp_password" class="form-control form-control-sm" value="{{ settings.smtp_password }}">
        </div>
      </div>
      <div class="mt-3 d-flex gap-2">
        <button type="submit" class="btn btn-sm btn-primary">儲存</button>
      </div>
    </form>
    <form method="POST" action="{{ url_for('admin.test_smtp') }}" class="mt-2">
      <button type="submit" class="btn btn-sm btn-outline-primary">寄送測試信</button>
    </form>
  </div>
</div>
{% endblock %}
