{% extends "admin/base_admin.html" %}
{% set active_page = 'nodes' %}
{% block title %}Nodes — Admin{% endblock %}
{% block admin_content %}
<div class="card mb-3">
  <div class="card-header"><h3 class="card-title">建立新 Node</h3></div>
  <div class="card-body">
    <form method="POST" action="{{ url_for('admin.create_node') }}" class="row g-2 align-items-end">
      <div class="col-auto">
        <label class="form-label">Code (內部識別)</label>
        <input type="text" name="code" class="form-control form-control-sm" placeholder="n_xxx" required>
      </div>
      <div class="col-auto">
        <label class="form-label">顯示名稱</label>
        <input type="text" name="display_name" class="form-control form-control-sm" required>
      </div>
      <div class="col-auto">
        <label class="form-label">排序</label>
        <input type="number" name="sort_order" class="form-control form-control-sm" value="100" style="width:80px;">
      </div>
      <div class="col-auto">
        <button type="submit" class="btn btn-sm btn-primary">建立</button>
      </div>
    </form>
  </div>
</div>

<div class="card">
  <div class="card-header"><h3 class="card-title">Nodes</h3></div>
  <div class="table-responsive">
    <table class="table table-vcenter" style="font-size:13px;">
      <thead><tr><th>Code</th><th>顯示名稱</th><th>排序</th><th>啟用</th><th>操作</th></tr></thead>
      <tbody>
        {% for n in nodes %}
        <tr>
          <form method="POST" action="{{ url_for('admin.update_node', node_id=n.id) }}">
            <td><code>{{ n.code }}</code></td>
            <td><input type="text" name="display_name" value="{{ n.display_name }}" class="form-control form-control-sm" style="width:100px;"></td>
            <td><input type="number" name="sort_order" value="{{ n.sort_order }}" class="form-control form-control-sm" style="width:80px;"></td>
            <td>
              <select name="is_active" class="form-select form-select-sm" style="width:70px;">
                <option value="1" {{ 'selected' if n.is_active }}>是</option>
                <option value="0" {{ 'selected' if not n.is_active }}>否</option>
              </select>
            </td>
            <td class="d-flex gap-1">
              <button type="submit" class="btn btn-sm btn-primary">儲存</button>
          </form>
              {% if n.is_active %}
                <form method="POST" action="{{ url_for('admin.disable_node', node_id=n.id) }}" style="display:inline;"
                      onsubmit="return confirm('確定停用 {{ n.display_name }}？停用後 Tracker 不再顯示此欄位。')">
                  <button type="submit" class="btn btn-sm btn-outline-danger">停用</button>
                </form>
              {% else %}
                <form method="POST" action="{{ url_for('admin.restore_node', node_id=n.id) }}" style="display:inline;">
                  <button type="submit" class="btn btn-sm btn-success">恢復</button>
                </form>
              {% endif %}
            </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
