{% extends "admin/base_admin.html" %}
{% set active_page = 'create_issue' %}
{% block title %}新增題目 — Admin{% endblock %}
{% block admin_content %}
<div class="card">
  <div class="card-header"><h3 class="card-title">新增題目</h3></div>
  <div class="card-body">
    <form method="POST" action="{{ url_for('admin.create_issue') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">題號 <span class="text-danger">*</span></label>
          <input type="text" name="display_number" class="form-control form-control-sm"
                 placeholder="例：301, P260, CN49" required>
        </div>
        <div class="col-md-9">
          <label class="form-label">Topic <span class="text-danger">*</span></label>
          <input type="text" name="topic" class="form-control form-control-sm"
                 placeholder="題目描述" required>
        </div>
      </div>
      <div class="row g-3 mt-1">
        <div class="col-md-3">
          <label class="form-label">Owner</label>
          <input type="text" name="requestor_name" class="form-control form-control-sm"
                 placeholder="Owner 名稱">
        </div>
        <div class="col-md-2">
          <label class="form-label">Week Year <span class="text-danger">*</span></label>
          <input type="number" name="week_year" class="form-control form-control-sm"
                 value="{{ current_week_year }}" required>
        </div>
        <div class="col-md-2">
          <label class="form-label">Week # <span class="text-danger">*</span></label>
          <input type="number" name="week_number" class="form-control form-control-sm"
                 value="{{ current_week_number }}" min="1" max="53" required>
        </div>
        <div class="col-md-5">
          <label class="form-label">JIRA Ticket</label>
          <input type="text" name="jira_ticket" class="form-control form-control-sm"
                 placeholder="JIRA-123">
        </div>
      </div>
      <div class="row g-3 mt-1">
        <div class="col-md-8">
          <label class="form-label">UAT Path（可換行輸入多條路徑）</label>
          <textarea name="uat_path" class="form-control form-control-sm" rows="2"
                    style="font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px;"
                    placeholder="/path/to/file_a&#10;/path/to/file_b"></textarea>
        </div>
        <div class="col-md-4">
          <label class="form-label">Group Label (選填)</label>
          <input type="text" name="group_label" class="form-control form-control-sm"
                 placeholder="特殊分組名稱">
        </div>
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-sm btn-primary">新增</button>
        <a href="{{ url_for('main.tracker') }}" class="btn btn-sm">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
