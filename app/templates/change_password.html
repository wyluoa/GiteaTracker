{% extends "base.html" %}

{% block title %}修改密碼 — Gitea Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-login">
    <div class="card">
      <div class="card-body">
        <h2 class="card-title text-center mb-4">修改密碼</h2>
        <form method="POST" action="{{ url_for('auth.change_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">目前密碼</label>
            <input type="password" name="current_password" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">新密碼 <small class="text-muted">(至少 6 字元)</small></label>
            <input type="password" name="new_password" class="form-control" required minlength="6">
          </div>
          <div class="mb-3">
            <label class="form-label">確認新密碼</label>
            <input type="password" name="new_password2" class="form-control" required minlength="6">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">確認修改</button>
            <a href="{{ url_for('main.tracker') }}" class="btn">取消</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
